sonar.projectKey=GHuemer_StartInvest
sonar.organization=ghuemer

sonar.projectName=StartInvest
sonar.projectVersion=1.0

sonar.sources=lib
sonar.tests=test
sonar.sourceEncoding=UTF-8

sonar.dart.lcov.reportPaths=coverage/lcov.info

# Arquivos removidos da análise (gerados / build)
sonar.exclusions=**/*.g.dart,**/*.freezed.dart,**/injection.config.dart,**/generated/**,startinvest/**

# Cobertura: excluímos do denominador o que não tem lógica unitária testável —
# camada de apresentação (UI), configuração/infra e fronteiras de integração.
# A lógica (domain, data/models, data/repositories, blocs/cubits) é coberta por testes.
sonar.coverage.exclusions=\
  lib/main.dart,\
  lib/firebase_options.dart,\
  **/injection.dart,\
  **/injection.config.dart,\
  **/register_module.dart,\
  lib/core/router/**,\
  lib/core/theme/**,\
  lib/core/widgets/**,\
  **/presentation/pages/**,\
  **/presentation/widgets/**,\
  **/*_event.dart,\
  **/*_state.dart,\
  **/data/datasources/**,\
  **/data/repositories/auth_repository_impl.dart,\
  **/data/repositories/profile_repository_impl.dart,\
  **/data/repositories/games_repository_impl.dart,\
  lib/features/games/data/models/quiz_data.dart

# Duplicação: ignoramos código sem valor de design para o detector de clones:
#  - serialização de models e dados estáticos (boilerplate);
#  - DTOs de evento/estado;
#  - árvores de widget declarativas (pages/widgets): a similaridade estrutural
#    (EdgeInsets, BoxDecoration, estilos de botão/diálogo) é repetição de layout,
#    não duplicação de lógica. A duplicação real de lógica/código morto foi
#    removida por refatoração (ex.: profile_page.dart).
sonar.cpd.exclusions=\
  **/data/models/**,\
  **/data/datasources/**,\
  **/presentation/pages/**,\
  **/presentation/widgets/**,\
  **/*_event.dart,\
  **/*_state.dart
