name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Testes e Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Verificar formatação
        run: dart format lib --output=none --set-exit-if-changed

      - name: Criar stub firebase_options.dart para CI
        run: |
          cat > lib/firebase_options.dart << 'EOF'
          // ignore_for_file: type=lint
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) return web;
              switch (defaultTargetPlatform) {
                case TargetPlatform.android: return android;
                case TargetPlatform.iOS: return ios;
                default: throw UnsupportedError('Unsupported platform');
              }
            }
            static const FirebaseOptions web = FirebaseOptions(apiKey:'ci',appId:'ci',messagingSenderId:'ci',projectId:'ci',storageBucket:'ci');
            static const FirebaseOptions android = FirebaseOptions(apiKey:'ci',appId:'ci',messagingSenderId:'ci',projectId:'ci',storageBucket:'ci');
            static const FirebaseOptions ios = FirebaseOptions(apiKey:'ci',appId:'ci',messagingSenderId:'ci',projectId:'ci',storageBucket:'ci',iosBundleId:'ci');
          }
          EOF

      - name: Análise estática
        run: flutter analyze

      - name: Rodar testes
        run: flutter test --coverage

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1

      - name: Build Web
        run: flutter build web --no-wasm-dry-run --release
