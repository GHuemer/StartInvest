name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Testes e Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Verificar formatação
        run: dart format lib --output=none --set-exit-if-changed

      - name: Análise estática
        run: flutter analyze

      - name: Rodar testes
        run: flutter test --coverage

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1

      - name: Build Web
        run: flutter build web --no-wasm-dry-run --release
